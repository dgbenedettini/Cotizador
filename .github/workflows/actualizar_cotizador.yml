name: Actualizar Cotizador
 
on:
  schedule:
    - cron: '0 10 * * 1'   # Todos los lunes a las 10am UTC (7am Paraguay)
  workflow_dispatch:         # También permite correrlo manualmente desde GitHub
 
jobs:
  actualizar:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
 
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Instalar dependencias
        run: pip install requests pandas openpyxl
 
      - name: Regenerar HTML
        run: python regenerar_html.py
 
      - name: Subir index.html actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Actualizacion automatica $(date '+%d/%m/%Y %H:%M')"
          git push
 
